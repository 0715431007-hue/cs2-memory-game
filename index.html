<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Memory Game</h1>
    <p>
        Click to flip cards and find the matching one
    </p>

    <div class="row">
        <div class="card" id="card1" onclick="flipCard('card1')">Strawberry</div>
        <div class="card" id="card2" onclick="flipCard('card2')">Orange</div>
        <div class="card" id="card3" onclick="flipCard('card3')">Banana</div>
        <div class="card" id="card4" onclick="flipCard('card4')">Grape</div>
    </div>

    <div class="row">
        <div class="card">Orange</div>
        <div class="card">Grape</div>
        <div class="card">Banana</div>
        <div class="card">Strawberry</div>
    </div>
    <h2>Guesses: 0</h2>

<script src="script.js"></script>   
</body>
</html>
